services:
  mongo:
    image: mongo
    container_name: mongo-server
    restart: always
    volumes:
      - ./data:/data/db
    ports:
      - 27017:27017
    env_file:
      - ../.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
